<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Task Board</title>

https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2script>

</head>

<body style="font-family:sans-serif; padding:20px">

<h2>Task Board</h2>

<input id="title" placeholder="Nový úkol..." />
<button onclick="addTask()">Přidat</button>

<ul id="list"></ul>

<script>
// ====== CONFIG ======
const SUPABASE_URL = "SEM_VLOZ_URL";
const SUPABASE_KEY = "SEM_VLOZ_KEY";
const BOARD_ID = "rodina";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ====== LOAD ======
async function loadTasks(){
  const { data } = await supabase
    .from("tasks")
    .select("*")
    .eq("board_id", BOARD_ID)
    .order("created_at");

  render(data);
}

function render(tasks){
  const list = document.getElementById("list");
  list.innerHTML = "";

  tasks.forEach(t => {
    const li = document.createElement("li");

    li.innerHTML = `
      ${t.title}
      ❌
    `;

    li.querySelector("button")?.remove();

    const del = document.createElement("button");
    del.innerText = "❌";
    del.onclick = async () => {
      await supabase.from("tasks").delete().eq("id", t.id);
      loadTasks();
    };

    li.appendChild(del);
    list.appendChild(li);
  });
}

// ====== ADD ======
async function addTask(){
  const title = document.getElementById("title").value;

  if(!title) return;

  await supabase.from("tasks").insert({
    board_id: BOARD_ID,
    title
  });

  document.getElementById("title").value = "";
  loadTasks();
}

// ====== REALTIME ======
supabase
  .channel('tasks')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => {
    loadTasks();
  })
  .subscribe();

// INIT
loadTasks();
</script>

</body>
</html>
